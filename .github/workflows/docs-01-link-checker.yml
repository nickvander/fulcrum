name: Docs Link Checker

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - '**.md'
  pull_request:
    paths:
      - '**.md'

jobs:
  link-checker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lychee Link Checker
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --verbose
            --no-progress
            './**/*.md'
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
