name: Bazel CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'MODULE.bazel'
      - '.bazelrc'
      - '.github/workflows/bazel-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'MODULE.bazel'
      - '.bazelrc'

jobs:
  bazel-frontend:
    name: Bazel Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Build Frontend
        run: bazel build //frontend:build

      - name: Build Frontend Container
        run: bazel build //frontend/image:frontend_image

# Note: Backend Bazel builds are disabled in CI due to heavy NVIDIA CUDA
# dependencies (nvidia-cublas-cu12 ~594MB) that fill the runner disk.
# Backend tests continue to use the existing docker-compose workflows.
