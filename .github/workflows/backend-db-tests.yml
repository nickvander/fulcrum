name: Backend DB Tests

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'

jobs:
  setup:
    uses: ./.github/workflows/reusable-setup.yml

  backend-db-test:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
    - name: Run DB Tests
      run: npm run test:backend:db
