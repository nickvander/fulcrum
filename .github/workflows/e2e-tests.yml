name: E2E Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Root Dependencies
        run: npm ci
        
      - name: Install Frontend Dependencies
        run: npm ci --prefix frontend
        
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        
      - name: Start Backend
        run: |
          docker compose -f docker-compose.test.yml up -d --build db-test backend
          echo "Waiting for DB to be healthy..."
          docker compose -f docker-compose.test.yml wait db-test
          
      - name: Wait for Backend API
        run: |
          echo "Waiting for Backend API to be ready..."
          timeout 60s bash -c 'until curl -s http://localhost:8000/docs > /dev/null; do sleep 2; done'
          
      - name: Start Frontend
        run: npm start --prefix frontend &
        
      - name: Wait for Frontend
        run: npx wait-on http://localhost:4200 --timeout 120000
        
      - name: Run E2E Tests
        run: npm run test:e2e
        
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
