name: Backend DB Tests

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'

jobs:
  backend-db-test-1:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-1
      cancel-in-progress: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run DB Tests
      run: docker compose -f docker-compose.test.yml up -d --build db-test backend && docker compose -f docker-compose.test.yml exec backend python -m pytest tests/test_ai_api.py tests/test_crud.py && docker compose -f docker-compose.test.yml down

  backend-db-test-2:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-2
      cancel-in-progress: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run DB Tests
      run: docker compose -f docker-compose.test.yml up -d --build db-test backend && docker compose -f docker-compose.test.yml exec backend python -m pytest tests/test_marketplace_api.py tests/test_products_api.py && docker compose -f docker-compose.test.yml down

  backend-db-test-3:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-3
      cancel-in-progress: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run DB Tests
      run: docker compose -f docker-compose.test.yml up -d --build db-test backend && docker compose -f docker-compose.test.yml exec backend python -m pytest tests/test_suppliers_api.py tests/test_uploads_api.py tests/test_users_api.py tests/test_superuser.py && docker compose -f docker-compose.test.yml down