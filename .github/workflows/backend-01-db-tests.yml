name: Backend DB Tests

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-01-db-tests.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'

jobs:
  backend-db-test-1:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-1
      cancel-in-progress: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run DB Tests
      run: |
        docker compose -f docker-compose.test.yml up -d --build db-test backend
        echo "Waiting for backend service to be ready..."
        docker compose -f docker-compose.test.yml wait backend
        echo "Backend service is ready, checking container status..."
        docker compose -f docker-compose.test.yml ps
        echo "Running database migrations..."
        docker compose -f docker-compose.test.yml exec backend /app/migrate.sh
        echo "Migrations completed, running tests..."
        echo "Executing: docker compose -f docker-compose.test.yml exec backend python -m pytest -v -s -c /app/pytest.ini tests/test_ai_api.py tests/test_crud.py"
        docker compose -f docker-compose.test.yml exec backend python -m pytest -v -s -c /app/pytest.ini tests/test_ai_api.py tests/test_crud.py
        echo "Tests completed, tearing down..."
        docker compose -f docker-compose.test.yml down

