<div class="tab-content" *transloco="let t">
    <div class="settings-section">
        <h2 class="section-title">{{ t('settings.stockThresholds') }}</h2>
        <p class="section-desc">{{ t('settings.stockThresholdsDesc') }}</p>
        <div class="settings-card">
            <form [formGroup]="form" (ngSubmit)="onSubmit()">
                <div class="form-row">
                    <mat-form-field appearance="outline" class="sleek-field">
                        <mat-label>{{ t('settings.lowStockDays') }}</mat-label>
                        <input matInput type="number" formControlName="low_inventory_days_default" min="1">
                        <mat-hint>{{ t('settings.lowStockDaysHint') }}</mat-hint>
                    </mat-form-field>
                    <mat-form-field appearance="outline" class="sleek-field">
                        <mat-label>{{ t('settings.lowQuantityThreshold') }}</mat-label>
                        <input matInput type="number" formControlName="low_stock_quantity_default" min="0">
                        <mat-hint>{{ t('settings.lowQuantityHint') }}</mat-hint>
                    </mat-form-field>
                </div>
                <div class="form-actions">
                    <button type="submit" mat-flat-button color="primary" [disabled]="!form.valid">
                        {{ t('settings.saveRules') }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
