<div class="container">
  <h1>Settings</h1>
  <form [formGroup]="settingsForm" (ngSubmit)="onSubmit()">
    <mat-card>
      <mat-card-header>
        <mat-card-title>AI Configuration</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <mat-form-field appearance="fill">
          <mat-label>AI Provider</mat-label>
          <mat-select formControlName="ai_provider">
            <mat-option value="openai">OpenAI</mat-option>
            <mat-option value="google">Google Gemini</mat-option>
            <mat-option value="anthropic">Anthropic Claude</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>AI API Key</mat-label>
          <input matInput formControlName="ai_api_key" type="password" placeholder="Enter your API key">
        </mat-form-field>
      </mat-card-content>
    </mat-card>

    <mat-card>
      <mat-card-header>
        <mat-card-title>Theme Settings</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <mat-form-field appearance="fill">
          <mat-label>Theme</mat-label>
          <mat-select formControlName="theme">
            <mat-option value="light">Light</mat-option>
            <mat-option value="dark">Dark</mat-option>
          </mat-select>
        </mat-form-field>
      </mat-card-content>
    </mat-card>

    <div class="actions">
      <button type="submit" mat-raised-button color="primary" [disabled]="!settingsForm.valid">Save Settings</button>
    </div>
  </form>

  <app-custom-field-list></app-custom-field-list>
</div>
