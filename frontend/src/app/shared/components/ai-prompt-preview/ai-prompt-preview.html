<div class="ai-prompt-preview" [class.expanded]="expanded" [class.has-content]="hasContent">
    <!-- Collapsed Header -->
    <button type="button" class="preview-header" (click)="toggleExpanded()" [disabled]="!hasContent"
        [matTooltip]="hasContent ? (expanded ? 'Collapse prompt preview' : 'See what prompt is sent to AI') : 'Select options to see prompt'">
        <div class="header-left">
            <mat-icon class="ai-icon">psychology</mat-icon>
            <span class="header-title">Prompt Preview</span>
            <span class="token-badge" *ngIf="hasContent">
                ~{{ getTokenEstimate() }} tokens
            </span>
        </div>
        <mat-icon class="expand-icon" *ngIf="hasContent">
            {{ expanded ? 'expand_less' : 'expand_more' }}
        </mat-icon>
    </button>

    <!-- Expanded Content -->
    <div class="preview-content" *ngIf="expanded && hasContent">
        <!-- Tone Section -->
        <div class="prompt-section" *ngIf="tonePrompt">
            <div class="section-header">
                <mat-icon>mood</mat-icon>
                <span>Tone</span>
            </div>
            <div class="section-body">
                <pre class="prompt-text">{{ tonePrompt }}</pre>
            </div>
        </div>

        <!-- Channel Guidelines Section -->
        <div class="prompt-section" *ngIf="channelGuidelines">
            <div class="section-header">
                <mat-icon>campaign</mat-icon>
                <span>Channel Guidelines</span>
            </div>
            <div class="section-body">
                <pre class="prompt-text">{{ channelGuidelines }}</pre>
            </div>
        </div>

        <!-- Custom Prompt Section -->
        <div class="prompt-section" *ngIf="customPrompt">
            <div class="section-header">
                <mat-icon>edit_note</mat-icon>
                <span>Your Custom Prompt</span>
            </div>
            <div class="section-body">
                <pre class="prompt-text">{{ customPrompt }}</pre>
            </div>
        </div>
    </div>
</div>
