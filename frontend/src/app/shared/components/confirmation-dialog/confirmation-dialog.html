<ng-container *transloco="let t">
  <h1 mat-dialog-title>{{ data.title }}</h1>
  <div mat-dialog-content>
    <p>{{ data.message }}</p>
  </div>
  <div mat-dialog-actions align="end">
    <button mat-button (click)="onDismiss()">{{ t('common.cancel') }}</button>
    <button mat-raised-button color="warn" (click)="onConfirm()" cdkFocusInitial>{{ t('common.confirm') }}</button>
  </div>
</ng-container>
