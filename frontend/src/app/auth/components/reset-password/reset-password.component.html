<div class="auth-container">
    <div class="auth-card">
        <h2>Reset Password</h2>
        <p class="auth-subtitle">Enter your new password below.</p>

        <div *ngIf="message" class="alert alert-success">
            {{ message }}
        </div>

        <div *ngIf="error" class="alert alert-danger">
            {{ error }}
        </div>

        <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()" *ngIf="!message && token">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" formControlName="password" class="form-control"
                    [ngClass]="{ 'is-invalid': submitted && f['password'].errors }" placeholder="Enter new password">
                <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
                    <div *ngIf="f['password'].errors['required']">Password is required</div>
                    <div *ngIf="f['password'].errors['minlength']">Password must be at least 8 characters</div>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" formControlName="confirmPassword" class="form-control"
                    [ngClass]="{ 'is-invalid': submitted && f['confirmPassword'].errors }"
                    placeholder="Confirm new password">
                <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
                    <div *ngIf="f['confirmPassword'].errors['required']">Confirm password is required</div>
                    <div *ngIf="f['confirmPassword'].errors['passwordMismatch']">Passwords do not match</div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block" [disabled]="isLoading">
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm mr-1"></span>
                Reset Password
            </button>
        </form>

        <div class="auth-footer">
            <a routerLink="/login">Back to Login</a>
        </div>
    </div>
</div>
