<div class="expense-container">
    <div class="header">
        <h1>Business Expenses</h1>
        <button mat-raised-button color="primary" (click)="onAddExpense()">
            <mat-icon>add</mat-icon> Add Expense
        </button>
    </div>

    <mat-card>
        <mat-card-content>
            <table mat-table [dataSource]="expenses" class="full-width">
                <!-- Date Column -->
                <ng-container matColumnDef="date">
                    <th mat-header-cell *matHeaderCellDef> Date </th>
                    <td mat-cell *matCellDef="let expense"> {{expense.date | date}} </td>
                </ng-container>

                <!-- Description Column -->
                <ng-container matColumnDef="description">
                    <th mat-header-cell *matHeaderCellDef> Description </th>
                    <td mat-cell *matCellDef="let expense"> {{expense.description}} </td>
                </ng-container>

                <!-- Category Column -->
                <ng-container matColumnDef="category">
                    <th mat-header-cell *matHeaderCellDef> Category </th>
                    <td mat-cell *matCellDef="let expense">
                        <span class="category-badge">{{expense.category}}</span>
                    </td>
                </ng-container>

                <!-- Amount Column -->
                <ng-container matColumnDef="amount">
                    <th mat-header-cell *matHeaderCellDef> Amount </th>
                    <td mat-cell *matCellDef="let expense"> {{expense.amount | currency:expense.currency}} </td>
                </ng-container>

                <!-- Actions Column -->
                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef> Actions </th>
                    <td mat-cell *matCellDef="let expense">
                        <button mat-icon-button color="warn" (click)="onDeleteExpense(expense.id)">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>

            @if (expenses.length === 0) {
            <div class="no-data">
                <mat-icon>info</mat-icon>
                <p>No expenses found. Click "Add Expense" to get started.</p>
            </div>
            }
        </mat-card-content>
    </mat-card>
</div>
