<h2 mat-dialog-title>Generated Password</h2>

<mat-dialog-content>
  <p>The new password has been generated for:</p>
  <p class="user-email"><strong>{{ data.userEmail }}</strong></p>
  <div class="password-display">
    <code class="password-code">{{ data.password }}</code>
    <button mat-icon-button (click)="onCopyPassword()" matTooltip="Copy to clipboard" class="copy-button">
      <mat-icon>content_copy</mat-icon>
    </button>
  </div>
  <p class="warning-message">Please share this password securely with the user and advise them to change it after first login.</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-raised-button color="primary" (click)="onOk()">OK</button>
</mat-dialog-actions>
