<div class="dialog-container">
  <h2 mat-dialog-title>Reset Password for {{ data.email }}</h2>
  
  <mat-dialog-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>New Password</mat-label>
        <input matInput formControlName="newPassword" [type]="'password'">
        <mat-error *ngIf="form.get('newPassword')?.hasError('required')">New password is required</mat-error>
        <mat-error *ngIf="form.get('newPassword')?.hasError('weakPassword')">Password must be at least 8 characters with uppercase, lowercase, number and special character</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Confirm New Password</mat-label>
        <input matInput formControlName="confirmNewPassword" [type]="'password'">
        <mat-error *ngIf="form.get('confirmNewPassword')?.hasError('required')">Please confirm new password</mat-error>
        <mat-error *ngIf="form.hasError('passwordMismatch')">Passwords do not match</mat-error>
      </mat-form-field>
    </form>
  </mat-dialog-content>
  
  <mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()">Cancel</button>
    <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="!form.valid">Reset Password</button>
  </mat-dialog-actions>
</div>
