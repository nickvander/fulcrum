<div class="container">
    <div class="header">
        <h1>Audit Logs</h1>
    </div>

    <div class="filters">
        <mat-form-field appearance="outline">
            <mat-label>Action</mat-label>
            <input matInput [(ngModel)]="filterAction" (keyup.enter)="loadLogs()">
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>User ID</mat-label>
            <input matInput type="number" [(ngModel)]="filterUserId" (keyup.enter)="loadLogs()">
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Date Range</mat-label>
            <mat-date-range-input [rangePicker]="picker">
                <input matStartDate placeholder="Start date" [(ngModel)]="filterStartDate">
                <input matEndDate placeholder="End date" [(ngModel)]="filterEndDate">
            </mat-date-range-input>
            <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-date-range-picker #picker></mat-date-range-picker>
        </mat-form-field>

        <button mat-raised-button color="primary" (click)="loadLogs()">Filter</button>
    </div>

    <div class="table-container mat-elevation-z8">
        <table mat-table [dataSource]="dataSource" class="full-width-table">
            <!-- ID Column -->
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef> ID </th>
                <td mat-cell *matCellDef="let log"> {{log.id}} </td>
            </ng-container>

            <!-- Action Column -->
            <ng-container matColumnDef="action">
                <th mat-header-cell *matHeaderCellDef> Action </th>
                <td mat-cell *matCellDef="let log"> {{log.action}} </td>
            </ng-container>

            <!-- User Column -->
            <ng-container matColumnDef="user">
                <th mat-header-cell *matHeaderCellDef> User </th>
                <td mat-cell *matCellDef="let log">
                    <span *ngIf="log.user">{{log.user.email}} ({{log.user_id}})</span>
                    <span *ngIf="!log.user">{{log.user_id}}</span>
                </td>
            </ng-container>

            <!-- Actor Column -->
            <ng-container matColumnDef="actor">
                <th mat-header-cell *matHeaderCellDef> Performed By </th>
                <td mat-cell *matCellDef="let log">
                    <span *ngIf="log.actor">{{log.actor.email}} ({{log.action_performed_by}})</span>
                    <span *ngIf="!log.actor">{{log.action_performed_by}}</span>
                </td>
            </ng-container>

            <!-- Details Column -->
            <ng-container matColumnDef="details">
                <th mat-header-cell *matHeaderCellDef> Details </th>
                <td mat-cell *matCellDef="let log"> {{log.details}} </td>
            </ng-container>

            <!-- Date Column -->
            <ng-container matColumnDef="created_at">
                <th mat-header-cell *matHeaderCellDef> Date </th>
                <td mat-cell *matCellDef="let log"> {{log.created_at | date:'medium'}} </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <mat-paginator [length]="resultsLength" [pageSize]="pageSize" [pageSizeOptions]="[10, 20, 50, 100]"
            (page)="onPageChange($event)">
        </mat-paginator>
    </div>
</div>
