<h2 mat-dialog-title>Receive Items - PO #{{po.id}}</h2>
<mat-dialog-content [formGroup]="receivingForm">
    <table class="receiving-table">
        <thead>
            <tr>
                <th>Product</th>
                <th>Ordered</th>
                <th>Received</th>
                <th>To Receive</th>
            </tr>
        </thead>
        <tbody formArrayName="items">
            <tr *ngFor="let itemControl of items.controls; let i=index" [formGroupName]="i">
                <td class="product-cell">
                    <div class="product-info">
                        <img *ngIf="po.items[i].product?.images?.length"
                            [src]="po.items[i].product!.images![0].url || po.items[i].product!.images![0]"
                            class="product-thumb" alt="Product">
                        <div class="product-details">
                            <div class="product-name">{{ po.items[i].product?.name || ('Product #' +
                                po.items[i].product_id) }}</div>
                            <div class="product-sku" *ngIf="po.items[i].product?.sku">{{ po.items[i].product?.sku }}
                            </div>
                        </div>
                    </div>
                </td>
                <td>{{ itemControl.get('quantity_ordered')?.value }}</td>
                <td>{{ itemControl.get('quantity_received_so_far')?.value }}</td>
                <td>
                    <mat-form-field appearance="outline" style="width: 100px;">
                        <input matInput type="number" formControlName="quantity_to_receive" min="0">
                    </mat-form-field>
                </td>
            </tr>
        </tbody>
    </table>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()">Cancel</button>
    <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="receivingForm.invalid">Receive</button>
</mat-dialog-actions>
