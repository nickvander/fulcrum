<ng-container *transloco="let t">
  <div class="ingestion-container">
    <h1>{{ t('products.ingestionTitle') }}</h1>

    <div class="scanner-container">
      <ngx-scanner-qrcode #scanner (event)="onScanSuccess($event)">
      </ngx-scanner-qrcode>
    </div>

    <div class="controls">
      <button mat-raised-button color="primary" (click)="capturePhoto()">
        {{ t('products.takePhoto') }}
      </button>
    </div>

    @if (scannedData) {
    <div class="results">
      <h2>{{ t('products.scannedBarcode') }}</h2>
      <pre>{{ scannedData | json }}</pre>
    </div>
    }

    @if (capturedImage) {
    <div class="results">
      <h2>{{ t('products.capturedImageLabel') }}</h2>
      <img [src]="capturedImage | safeUrl" [alt]="t('products.capturedImageLabel')" />
    </div>
    }
  </div>
</ng-container>
