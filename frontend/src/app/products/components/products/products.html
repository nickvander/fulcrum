<mat-sidenav-container class="sidenav-container">
  <!-- Main content area -->
  <mat-sidenav-content>
    <app-product-list 
      (editProduct)="openEditPanel($event)"
      (addProduct)="openAddPanel()">
    </app-product-list>
  </mat-sidenav-content>

  <!-- Side navigation panel for editing -->
  <mat-sidenav #sidenav mode="over" position="end" class="edit-sidenav">
    <div class="sidenav-content">
      <div class="sidenav-header">
        <h2>{{ isEditing ? 'Edit Product' : 'Add Product' }}</h2>
        <button mat-icon-button (click)="closeEditPanel()" class="close-button">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      
      <div class="sidenav-body" *ngIf="selectedProduct">
        <app-product-form 
          [product]="selectedProduct" 
          (productSaved)="onProductSaved()" 
          (formClosed)="closeEditPanel()">
        </app-product-form>
      </div>
    </div>
  </mat-sidenav>
</mat-sidenav-container>
