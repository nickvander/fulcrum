<div class="batch-action-toolbar">
  <div class="toolbar-content">
    <div class="selection-info">
      <mat-icon>select_all</mat-icon>
      <span>{{ selectedCount }} selected</span>
    </div>
    <div class="toolbar-actions">
      @if (selectedCount < 1) {
        <button mat-stroked-button (click)="onSelectAll()">
          <mat-icon>select_all</mat-icon>
          Select All
        </button>
      }
      @if (selectedCount >= 1) {
        <button mat-stroked-button (click)="onDeselectAll()">
          <mat-icon>clear</mat-icon>
          Deselect All
        </button>
      }
      @if (selectedCount >= 1) {
        <button mat-raised-button (click)="onDeleteSelected()" color="warn">
          <mat-icon>delete</mat-icon>
          Delete Selected
        </button>
      }

      <!-- Advanced Batch Operations Menu -->
      @if (selectedCount >= 1) {
        <button
          mat-stroked-button
          [matMenuTriggerFor]="advancedBatchMenu"
          class="advanced-menu-btn">
          <mat-icon>more_vert</mat-icon>
          Advanced
        </button>
      }

      <mat-menu #advancedBatchMenu="matMenu">
        <button mat-menu-item (click)="onBatchPriceUpdate()">
          <mat-icon>payments</mat-icon>
          <span>Update Prices</span>
        </button>
        <button mat-menu-item (click)="onBatchCategoryUpdate()">
          <mat-icon>category</mat-icon>
          <span>Assign Category</span>
        </button>
        <button mat-menu-item (click)="onBatchCustomFieldUpdate()">
          <mat-icon>edit_attributes</mat-icon>
          <span>Update Custom Fields</span>
        </button>
      </mat-menu>

      <button mat-icon-button (click)="onClose()" class="close-button">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </div>
</div>
