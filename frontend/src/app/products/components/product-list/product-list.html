<div class="container">
  <div class="header">
    <h1>Products</h1>
    <button mat-raised-button color="primary" routerLink="new">
      <mat-icon>add</mat-icon>
      <span>Add Product</span>
    </button>
    <button mat-raised-button color="accent" routerLink="/ingest" class="scan-button">
      <mat-icon>qr_code_scanner</mat-icon>
      <span>Scan Product</span>
    </button>
  </div>

  <div class="search-container">
    <app-ai-search-bar (searchQuery)="onSearchQuery($any($event))"></app-ai-search-bar>
    <button mat-button (click)="clearSearch()">Clear Search</button>
  </div>

  <div *ngIf="dataSource.data.length === 0" class="empty-state">
    <h2>No products found.</h2>
    <p>Get started by adding your first product to the inventory.</p>
    <button mat-raised-button color="primary" routerLink="new">
      <mat-icon>add</mat-icon>
      <span>Create Your First Product</span>
    </button>
  </div>

  <mat-table [dataSource]="dataSource" matSort *ngIf="dataSource.data.length > 0">
    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Name</mat-header-cell>
      <mat-cell *matCellDef="let row">{{row.name}}</mat-cell>
    </ng-container>

    <!-- SKU Column -->
    <ng-container matColumnDef="sku">
      <mat-header-cell *matHeaderCellDef mat-sort-header>SKU</mat-header-cell>
      <mat-cell *matCellDef="let row">{{row.sku}}</mat-cell>
    </ng-container>

    <!-- Price Column -->
    <ng-container matColumnDef="default_resale_price">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Price</mat-header-cell>
      <mat-cell *matCellDef="let row">{{row.default_resale_price | currency}}</mat-cell>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef></mat-header-cell>
      <mat-cell *matCellDef="let row">
        <button mat-icon-button [routerLink]="['edit', row.id]">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteProduct(row.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
  </mat-table>

  <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" *ngIf="dataSource.data.length > 0"></mat-paginator>
</div>
