<div class="container">
  <div class="header">
    <h1>Products</h1>
    <button mat-raised-button color="primary" routerLink="new">
      <mat-icon>add</mat-icon>
      <span>Add Product</span>
    </button>
    <button mat-raised-button color="accent" routerLink="/ingest" class="scan-button">
      <mat-icon>qr_code_scanner</mat-icon>
      <span>Scan Product</span>
    </button>
  </div>

  <div class="search-container">
    <app-ai-search-bar (searchQuery)="onSearchQuery($any($event))"></app-ai-search-bar>
    <button mat-button (click)="clearSearch()">Clear Search</button>
  </div>

  <div *ngIf="products.length === 0" class="empty-state">
    <mat-icon class="empty-state-icon">inventory_2</mat-icon>
    <h2>No products found.</h2>
    <p>Get started by adding your first product to the inventory.</p>
    <button mat-raised-button color="primary" routerLink="new">
      <mat-icon>add</mat-icon>
      <span>Create Your First Product</span>
    </button>
  </div>

  <div class="product-grid" *ngIf="products.length > 0">
    <mat-card *ngFor="let product of products" class="product-card">
      <img mat-card-image [src]="getImageUrl(getPrimaryImage(product))" [alt]="product.name" class="product-image" (error)="onImageError($event)" *ngIf="getPrimaryImage(product) !== 'placeholder.jpg'; else noImage">
      <ng-template #noImage>
        <div class="no-image-placeholder">
          <mat-icon>image</mat-icon>
        </div>
      </ng-template>
      <mat-card-header>
        <mat-card-title>{{ product.name }}</mat-card-title>
        <mat-card-subtitle>{{ product.sku }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p class="price">{{ product.default_resale_price | currency }}</p>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button (click)="openStockAdjustmentDialog(product)">ADJUST STOCK</button>
        <button mat-button [routerLink]="['edit', product.id]">EDIT</button>
        <button mat-button color="warn" (click)="deleteProduct(product.id)">DELETE</button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
