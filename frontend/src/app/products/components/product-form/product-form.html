<div class="form-container">
  <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
    <div class="form-header">
      <h1>{{ isEditMode ? 'Edit Product' : 'Add New Product' }}</h1>
      <div class="header-actions">
        <button type="button" mat-stroked-button (click)="onCancel()">Cancel</button>
        <button type="submit" mat-raised-button color="primary"
          [disabled]="!isDirty || productForm.invalid">Save</button>
      </div>
    </div>

    <div class="form-columns">
      <!-- Left Column -->
      <div class="form-column">
        <mat-card>
          <mat-card-header>
            <mat-card-title>Core Details</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <mat-form-field>
              <mat-label>Name</mat-label>
              <input matInput formControlName="name" placeholder="Product Name">
            </mat-form-field>

            <mat-form-field>
              <mat-label>SKU</mat-label>
              <input matInput formControlName="sku" placeholder="Product SKU">
            </mat-form-field>

            <mat-form-field>
              <mat-label>Description</mat-label>
              <textarea matInput formControlName="description" placeholder="Product Description"></textarea>
            </mat-form-field>
          </mat-card-content>
        </mat-card>

        <mat-card>
          <mat-card-header>
            <mat-card-title>Pricing & Supplier</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <mat-form-field>
              <mat-label>Resale Price</mat-label>
              <input matInput formControlName="default_resale_price" type="number" placeholder="0.00">
            </mat-form-field>

            <mat-form-field>
              <mat-label>Cost Price</mat-label>
              <input matInput formControlName="cost_price" type="number" placeholder="0.00">
            </mat-form-field>
          </mat-card-content>
        </mat-card>

        <mat-card>
          <mat-card-header>
            <mat-card-title>Dimensions & Weight</mat-card-title>
          </mat-card-header>
          <mat-card-content class="dimensions-grid">
            <mat-form-field>
              <mat-label>Width</mat-label>
              <input matInput formControlName="width" type="number" placeholder="0.00">
            </mat-form-field>

            <mat-form-field>
              <mat-label>Height</mat-label>
              <input matInput formControlName="height" type="number" placeholder="0.00">
            </mat-form-field>

            <mat-form-field>
              <mat-label>Depth</mat-label>
              <input matInput formControlName="depth" type="number" placeholder="0.00">
            </mat-form-field>

            <mat-form-field>
              <mat-label>Weight</mat-label>
              <input matInput formControlName="weight" type="number" placeholder="0.00">
            </mat-form-field>
          </mat-card-content>
        </mat-card>
      </div>

      <!-- Right Column -->
      <div class="form-column">
        <mat-card>
          <mat-card-header>
            <mat-card-title>Images</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <app-product-form-image-gallery [existingImages]="product?.images || []" [stagedImages]="stagedImages"
              [stagedImagePreviews]="stagedImagePreviews" [productId]="productId"
              (stagedImagesChange)="onStagedImagesChange($event)"
              (stagedImagePreviewsChange)="onStagedImagePreviewsChange($event)"
              (imagesToDelete)="onImagesToDelete($event)" (primaryImageChange)="onPrimaryImageChange($event)"
              (imageUpdated)="onImageUpdated($event)"
              (existingImagesChange)="onExistingImagesOrderChange($event)"></app-product-form-image-gallery>
          </mat-card-content>
        </mat-card>

        <mat-card *ngIf="customFields.length > 0">
          <mat-card-header>
            <mat-card-title>Custom Fields</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <div *ngFor="let field of customFields">
              <mat-form-field>
                <mat-label>{{ field.name }}</mat-label>
                <input matInput [formControlName]="'custom_field_' + field.id" [type]="field.type">
              </mat-form-field>
            </div>
          </mat-card-content>
        </mat-card>

        <mat-card>
          <mat-card-header>
            <mat-card-title>Product Variants</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <app-product-variants [productVariants]="productVariants" (variantsChanged)="productVariants = $event"
              (addVariant)="onAddVariant()">
            </app-product-variants>
          </mat-card-content>
        </mat-card>
      </div>
    </div>
  </form>
</div>
