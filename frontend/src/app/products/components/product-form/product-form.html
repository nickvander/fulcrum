<div class="container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ isEditMode ? 'Edit Product' : 'Add New Product' }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="fill">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name" placeholder="Product Name">
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>SKU</mat-label>
          <input matInput formControlName="sku" placeholder="Product SKU">
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="description" placeholder="Product Description"></textarea>
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>Resale Price</mat-label>
          <input matInput formControlName="default_resale_price" type="number" placeholder="0.00">
        </mat-form-field>

        <div class="actions">
          <button type="button" mat-stroked-button (click)="onCancel()">Cancel</button>
          <button type="submit" mat-raised-button color="primary" [disabled]="!productForm.valid">Save</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-card *ngIf="isEditMode" class="image-card">
    <mat-card-header>
      <mat-card-title>Product Images</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="image-upload">
        <button type="button" mat-stroked-button (click)="fileInput.click()">
          <mat-icon>add_a_photo</mat-icon>
          <span>Upload Image</span>
        </button>
        <input hidden #fileInput type="file" (change)="onFileSelected($event)" accept="image/*">
      </div>

      <div class="image-gallery" *ngIf="product?.images?.length">
        <div *ngFor="let image of product.images" class="image-container">
          <img [src]="image.image_path" [alt]="product.name">
        </div>
      </div>
      <div *ngIf="!product?.images?.length" class="no-images">
        <p>No images uploaded for this product yet.</p>
      </div>
    </mat-card-content>
  </mat-card>
</div>
