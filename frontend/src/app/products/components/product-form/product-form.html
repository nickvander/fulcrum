<div class="form-container">
  <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
    <div class="form-header">
      <h1>{{ isEditMode ? 'Edit Product' : 'Add New Product' }}</h1>
      <div class="header-actions">
        <button type="button" mat-stroked-button (click)="onCancel()">Cancel</button>
        <button type="submit" mat-raised-button color="primary" [disabled]="!productForm.valid">Save</button>
      </div>
    </div>

    <div class="form-columns">
      <!-- Left Column -->
      <div class="form-column">
        <mat-card>
          <mat-card-header>
            <mat-card-title>Core Details</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <mat-form-field>
              <mat-label>Name</mat-label>
              <input matInput formControlName="name" placeholder="Product Name">
            </mat-form-field>

            <mat-form-field>
              <mat-label>SKU</mat-label>
              <input matInput formControlName="sku" placeholder="Product SKU">
            </mat-form-field>

            <mat-form-field>
              <mat-label>Description</mat-label>
              <textarea matInput formControlName="description" placeholder="Product Description"></textarea>
            </mat-form-field>
          </mat-card-content>
        </mat-card>

        <mat-card>
          <mat-card-header>
            <mat-card-title>Pricing & Supplier</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <mat-form-field>
              <mat-label>Resale Price</mat-label>
              <input matInput formControlName="default_resale_price" type="number" placeholder="0.00">
            </mat-form-field>

            <mat-form-field>
              <mat-label>Cost Price</mat-label>
              <input matInput formControlName="cost_price" type="number" placeholder="0.00">
            </mat-form-field>
          </mat-card-content>
        </mat-card>

        <mat-card>
          <mat-card-header>
            <mat-card-title>Dimensions & Weight</mat-card-title>
          </mat-card-header>
          <mat-card-content class="dimensions-grid">
            <mat-form-field>
              <mat-label>Width</mat-label>
              <input matInput formControlName="width" type="number" placeholder="0.00">
            </mat-form-field>

            <mat-form-field>
              <mat-label>Height</mat-label>
              <input matInput formControlName="height" type="number" placeholder="0.00">
            </mat-form-field>

            <mat-form-field>
              <mat-label>Depth</mat-label>
              <input matInput formControlName="depth" type="number" placeholder="0.00">
            </mat-form-field>

            <mat-form-field>
              <mat-label>Weight</mat-label>
              <input matInput formControlName="weight" type="number" placeholder="0.00">
            </mat-form-field>
          </mat-card-content>
        </mat-card>
      </div>

      <!-- Right Column -->
      <div class="form-column">
        <mat-card>
          <mat-card-header>
            <mat-card-title>Images</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <div class="image-upload">
              <button type="button" mat-stroked-button (click)="fileInput.click()">
                <mat-icon>add_a_photo</mat-icon>
                <span>Upload Image</span>
              </button>
              <input hidden #fileInput type="file" (change)="onFileSelected($event)" accept="image/*" multiple>
            </div>

            <div class="staged-images" *ngIf="!isEditMode && stagedImages.length > 0">
              <div *ngFor="let preview of stagedImagePreviews; let i = index" class="image-container">
                <img [src]="preview" alt="Staged image preview">
                <div class="image-actions">
                  <button mat-icon-button color="warn" (click)="removeStagedImage(i)">
                    <mat-icon>close</mat-icon>
                  </button>
                </div>
              </div>
            </div>

                          <div class="image-gallery" *ngIf="product?.images?.length">
                            <div *ngFor="let image of product?.images" class="image-container" [class.primary-image-container]="image.is_primary">
                              <img [src]="getImageUrl(image.image_path)" [alt]="image.title || product?.name" [class.primary-image]="image.is_primary" (click)="openImageDialog(image)">
                              <div class="image-overlay" (click)="openImageDialog(image)">
                                <div class="image-overlay-content">
                                  <button mat-icon-button class="overlay-button" matTooltip="Set as primary image" [class.selected]="image.is_primary" (click)="setPrimaryImage($event, image.id)">
                                    <mat-icon>{{ image.is_primary ? 'star' : 'star_border' }}</mat-icon>
                                  </button>
                                  <button mat-icon-button class="overlay-button" color="warn" matTooltip="Delete image" (click)="$event.stopPropagation(); deleteImage($event, image.id)">
                                    <mat-icon>delete</mat-icon>
                                  </button>
                                </div>
                              </div>
                            </div>
                          </div>            <div *ngIf="!product?.images?.length && isEditMode" class="no-images">
              <p>No images uploaded for this product yet.</p>
            </div>
          </mat-card-content>
        </mat-card>

        <mat-card *ngIf="customFields.length > 0">
          <mat-card-header>
            <mat-card-title>Custom Fields</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <div *ngFor="let field of customFields">
              <mat-form-field>
                <mat-label>{{ field.name }}</mat-label>
                <input matInput [formControlName]="'custom_field_' + field.id" [type]="field.type">
              </mat-form-field>
            </div>
          </mat-card-content>
        </mat-card>
      </div>
    </div>
  </form>
</div>
