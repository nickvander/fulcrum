<div class="variants-container">
  <div class="add-variant-container">
    <button mat-raised-button color="primary" (click)="onAddVariant()" class="add-variant-btn">
      <mat-icon>add</mat-icon>
      Add Variant
    </button>
  </div>

  @if (editableVariants.length > 0) {
    <div class="variants-list">
      @for (variant of editableVariants; track variant; let i = $index) {
        <mat-card
          class="variant-card"
          >
          <div class="variant-header">
            <h4>{{ variant.name || 'New Variant' }}</h4>
            <div class="variant-actions">
              <button mat-icon-button (click)="onRemoveVariant(i)" matTooltip="Remove variant">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </div>
          <div class="variant-details">
            <mat-form-field class="variant-field">
              <mat-label>Name</mat-label>
              <input
                matInput
                [value]="variant.name"
                (input)="updateVariant(i, 'name', $any($event.target).value)"
                placeholder="e.g., Red - Large">
            </mat-form-field>
            <mat-form-field class="variant-field">
              <mat-label>SKU</mat-label>
              <input
                matInput
                [value]="variant.sku"
                (input)="updateVariant(i, 'sku', $any($event.target).value)"
                placeholder="Unique SKU for this variant">
            </mat-form-field>
            <mat-form-field class="variant-field">
              <mat-label>Price</mat-label>
              <input
                matInput
                type="number"
                [value]="variant.price || ''"
                (input)="updateVariant(i, 'price', $any($event.target).value ? +$any($event.target).value : null)"
                placeholder="Override default price">
            </mat-form-field>
            <mat-form-field class="variant-field">
              <mat-label>Stock Quantity</mat-label>
              <input
                matInput
                type="number"
                [value]="variant.stock_quantity || ''"
                (input)="updateVariant(i, 'stock_quantity', $any($event.target).value ? +$any($event.target).value : null)"
                placeholder="Stock quantity">
            </mat-form-field>
            <mat-form-field class="variant-field full-width">
              <mat-label>Attributes</mat-label>
              <textarea
                matInput
                [value]="variant.attributes ? (variant.attributes | json) : ''"
                (input)="updateVariant(i, 'attributes', parseJsonSafely($any($event.target).value))"
                placeholder="JSON object of attributes (e.g., {'color': 'red', 'size': 'large'})"
                rows="4">
              </textarea>
            </mat-form-field>
          </div>
        </mat-card>
      }
    </div>
  } @else {
    <div class="no-variants">
      <mat-icon class="no-variants-icon">category</mat-icon>
      <p>No variants defined yet. Add your first variant to get started.</p>
    </div>
  }

</div>
