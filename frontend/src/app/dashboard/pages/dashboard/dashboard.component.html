<ng-container *transloco="let t">
    <div class="dashboard-container">
        <div class="header">
            <div>
                <h1>{{ t('dashboard.title') }}</h1>
                <p>{{ t('dashboard.overview') }}</p>
            </div>
            <button mat-icon-button color="primary" (click)="refresh()" [matTooltip]="t('common.refresh')">
                <mat-icon>refresh</mat-icon>
            </button>
        </div>

        <ng-container *ngIf="stats$ | async as stats; else loading">
            <div class="dashboard-grid">
                <app-stat-card [title]="t('dashboard.totalProducts')" [value]="stats.totalProducts" icon="inventory_2"
                    colorType="primary" link="/products" [tooltip]="t('dashboard.totalProducts')"></app-stat-card>

                <app-stat-card [title]="t('dashboard.totalValue')"
                    [value]="(stats.totalInventoryValue | currency:'USD':'symbol':'1.0-0') ?? ''" icon="payments"
                    colorType="success" link="/products" [tooltip]="t('dashboard.totalValue')"></app-stat-card>

                <app-stat-card [title]="t('dashboard.inventoryHealth')" [value]="stats.stockHealthPercentage + '%'"
                    icon="health_and_safety" colorType="accent" link="/products"
                    [tooltip]="t('dashboard.inventoryHealth')"></app-stat-card>

                <app-stat-card [title]="t('dashboard.pendingOrders')" [value]="stats.pendingOrdersCount"
                    icon="shopping_cart" colorType="warn" link="/suppliers/po"
                    [tooltip]="t('dashboard.pendingOrders')"></app-stat-card>
            </div>

            <div class="secondary-grid">
                <div class="grid-section">
                    <app-low-stock-list [products]="stats.lowStockProducts"
                        class="dashboard-widget"></app-low-stock-list>
                </div>
                <div class="grid-section">
                    <app-inventory-health-widget class="dashboard-widget"></app-inventory-health-widget>
                </div>
            </div>
        </ng-container>

        <ng-template #loading>
            <div class="loading-container">
                <mat-spinner diameter="40"></mat-spinner>
            </div>
        </ng-template>
    </div>
</ng-container>
