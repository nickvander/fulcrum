<div class="dashboard-container">
    <div class="header">
        <div>
            <h1>Dashboard</h1>
            <p>Key metrics at a glance</p>
        </div>
        <button mat-icon-button color="primary" (click)="refresh()" matTooltip="Refresh Dashboard">
            <mat-icon>refresh</mat-icon>
        </button>
    </div>

    <ng-container *ngIf="stats$ | async as stats; else loading">
        <div class="dashboard-grid">
            <app-stat-card title="Products" [value]="stats.totalProducts" icon="inventory_2" colorType="primary"
                link="/products" tooltip="Total number of unique items in your catalog"></app-stat-card>

            <app-stat-card title="Inventory Value"
                [value]="(stats.totalInventoryValue | currency:'USD':'symbol':'1.0-0') ?? ''" icon="payments"
                colorType="success" link="/products"
                tooltip="Estimated commercial value of all stock on hand"></app-stat-card>

            <app-stat-card title="Stock Health" [value]="stats.stockHealthPercentage + '%'" icon="health_and_safety"
                colorType="accent" link="/products"
                tooltip="Percentage of products with stock above reorder threshold"></app-stat-card>

            <app-stat-card title="Inbound Orders" [value]="stats.pendingOrdersCount" icon="shopping_cart"
                colorType="warn" link="/suppliers/po"
                tooltip="Active Purchase Orders being processed or shipped"></app-stat-card>
        </div>

        <div class="secondary-grid">
            <div class="grid-section">
                <!-- <h2 class="section-title">Low Stock Alerts</h2> -->
                <app-low-stock-list [products]="stats.lowStockProducts" class="dashboard-widget"></app-low-stock-list>
            </div>
            <div class="grid-section">
                <!-- <h2 class="section-title">Inventory Health</h2> -->
                <app-inventory-health-widget class="dashboard-widget"></app-inventory-health-widget>
            </div>
        </div>
    </ng-container>

    <ng-template #loading>
        <div class="loading-container">
            <mat-spinner diameter="40"></mat-spinner>
        </div>
    </ng-template>
</div>
