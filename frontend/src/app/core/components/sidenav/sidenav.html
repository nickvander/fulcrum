<mat-nav-list>
  <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
    <mat-icon matListItemIcon>dashboard</mat-icon>
    <span matListItemTitle>Dashboard</span>
  </a>
  <a mat-list-item routerLink="/products" routerLinkActive="active-link">
    <mat-icon matListItemIcon>inventory_2</mat-icon>
    <span matListItemTitle>Products</span>
  </a>

  <!-- Purchasing Section (expandable) -->
  <mat-expansion-panel [expanded]="purchasingExpanded" class="nav-expansion" hideToggle>
    <mat-expansion-panel-header>
      <mat-panel-title class="nav-panel-title">
        <mat-icon matListItemIcon>shopping_cart</mat-icon>
        <span matListItemTitle>Purchasing</span>
      </mat-panel-title>
    </mat-expansion-panel-header>
    <div class="nested-nav">
      <a mat-list-item routerLink="/suppliers/po" routerLinkActive="active-link">
        <mat-icon matListItemIcon>receipt_long</mat-icon>
        <span matListItemTitle>Purchase Orders</span>
      </a>
      <a mat-list-item routerLink="/expenses" routerLinkActive="active-link">
        <mat-icon matListItemIcon>payments</mat-icon>
        <span matListItemTitle>Expenses</span>
      </a>
      <a mat-list-item routerLink="/suppliers" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}">
        <mat-icon matListItemIcon>business</mat-icon>
        <span matListItemTitle>Suppliers</span>
      </a>
    </div>
  </mat-expansion-panel>

  <a mat-list-item routerLink="/marketplaces" routerLinkActive="active-link">
    <mat-icon matListItemIcon>storefront</mat-icon>
    <span matListItemTitle>Marketplaces</span>
  </a>
  <a mat-list-item routerLink="/marketing" routerLinkActive="active-link">
    <mat-icon matListItemIcon>campaign</mat-icon>
    <span matListItemTitle>Marketing</span>
  </a>
  @if (isAdmin$ | async) {
  <a mat-list-item routerLink="/users" routerLinkActive="active-link">
    <mat-icon matListItemIcon>people</mat-icon>
    <span matListItemTitle>Users</span>
  </a>
  }

  <a mat-list-item routerLink="/settings" routerLinkActive="active-link">
    <mat-icon matListItemIcon>settings</mat-icon>
    <span matListItemTitle>Settings</span>
  </a>
</mat-nav-list>
