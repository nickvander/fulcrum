[pytest]
env =
    DATABASE_URL=postgresql://fulcrum_test:fulcrum_test@db-test:5432/fulcrum_test
    MARKETPLACE_ENCRYPTION_KEY=H35Vk1qaARMj/yX6EC0QrCYvmkWW/lgRdB7aQbsSivE=

markers =
    fast: marks tests as fast (deselect with '-m "not fast"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    postgres: mark a test as requiring a postgres database
    db: mark a test as database-dependent
    asyncio: mark test as async
    integration: mark test as integration test (deselect with '-m "not integration"')
    integration_ml: mark test as MercadoLibre integration test (live API calls)
filterwarnings =
    ignore:'crypt' is deprecated and slated for removal in Python 3.13
    ignore::pytest.PytestUnknownMarkWarning
addopts = --strict-markers
