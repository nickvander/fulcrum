[pytest]
env =
    DATABASE_URL=postgresql://fulcrum_test:fulcrum_test@db-test:5432/fulcrum_test
markers =
    fast: marks tests as fast (deselect with '-m "not fast"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    postgres: mark a test as requiring a postgres database
    db: mark a test as database-dependent
filterwarnings =
    ignore:'crypt' is deprecated and slated for removal in Python 3.13
    ignore::pytest.PytestUnknownMarkWarning
addopts = --strict-markers
