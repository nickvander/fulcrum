version: '3.8'

services:
  db-test:
    image: pgvector/pgvector:pg15
    environment:
      - POSTGRES_USER=fulcrum_test
      - POSTGRES_PASSWORD=fulcrum_test
      - POSTGRES_DB=fulcrum_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_test:/var/lib/postgresql/data/

  backend:
    environment:
      - DATABASE_URL=postgresql://fulcrum_test:fulcrum_test@db-test:5432/fulcrum_test

volumes:
  postgres_data_test:
