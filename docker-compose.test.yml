services:
  db-test:
    image: pgvector/pgvector:pg15
    environment:
      - POSTGRES_USER=fulcrum_test
      - POSTGRES_PASSWORD=fulcrum_test
      - POSTGRES_DB=fulcrum_test
    ports:
      - "${FULCRUM_TEST_DB_PORT:-5434}:5432"
    volumes:
      - postgres_data_test:/var/lib/postgresql/data/
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U fulcrum_test -d fulcrum_test" ]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7-alpine
    ports:
      - "${FULCRUM_TEST_REDIS_PORT:-6379}:6379"

  backend:
    build:
      context: ./backend
      args:
        REQUIREMENTS_FILE: requirements-test.txt
    working_dir: /app
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/pytest.ini:/app/pytest.ini
    ports:
      - "${FULCRUM_TEST_BACKEND_PORT:-8200}:8000"
    depends_on:
      db-test:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://fulcrum_test:fulcrum_test@db-test:5432/fulcrum_test
      - FIRST_SUPERUSER_EMAIL=test@example.com
      - FIRST_SUPERUSER_PASSWORD=SecurePass123!
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=testsecretkey
      # Encryption key required by pydantic Settings at app import time.
      # pytest.ini also sets this for the test process; both must agree.
      - MARKETPLACE_ENCRYPTION_KEY=H35Vk1qaARMj/yX6EC0QrCYvmkWW/lgRdB7aQbsSivE=
      # TESTING is intentionally NOT set here. conftest.py forces
      # os.environ["TESTING"] = "True" at import time, so pytest still
      # behaves as expected. Setting it here would also affect uvicorn
      # at container boot, which would skip default-superuser creation
      # in src/main.py and disable slowapi rate limiting — breaking
      # interactive use of `docker compose -f docker-compose.test.yml up`.

  worker:
    build: ./backend
    environment:
      - FIRST_SUPERUSER_EMAIL=test@example.com
      - FIRST_SUPERUSER_PASSWORD=SecurePass123!
    healthcheck:
      test: [ "CMD", "celery", "-A", "src.celery_worker.celery_app", "status" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data_test:
