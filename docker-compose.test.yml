version: '3.8'

services:
  db-test:
    image: pgvector/pgvector:pg15
    environment:
      - POSTGRES_USER=fulcrum_test
      - POSTGRES_PASSWORD=fulcrum_test
      - POSTGRES_DB=fulcrum_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_test:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fulcrum_test -d fulcrum_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    working_dir: /app
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    ports:
      - "8000:8000"
    depends_on:
      db-test:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://fulcrum_test:fulcrum_test@db-test:5432/fulcrum_test
      - FIRST_SUPERUSER_EMAIL=test@example.com
      - FIRST_SUPERUSER_PASSWORD=testpassword
      - REDIS_URL=redis://localhost:6379/0
      - SECRET_KEY=testsecretkey

  worker:
    build: ./backend
    environment:
      - FIRST_SUPERUSER_EMAIL=test@example.com
      - FIRST_SUPERUSER_PASSWORD=testpassword
    healthcheck:
      test: ["CMD", "celery", "-A", "src.celery_worker.celery_app", "status"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data_test: