# Example Docker Compose configuration using Bazel-built images
#
# To use this:
# 1. Build the images with Bazel:
#    bazel run //backend/image:backend_tarball
#    bazel run //frontend/image:frontend_tarball
# 2. Start services: docker compose -f docker-compose.bazel.yml up
#
# This demonstrates integrating Bazel builds with Docker Compose

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fulcrum
      POSTGRES_USER: fulcrum
      POSTGRES_PASSWORD: fulcrum
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    # Build from Dockerfile (Bazel py_binary has runfiles issue, use traditional Docker for backend)
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://fulcrum:fulcrum@db:5432/fulcrum
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      FIRST_SUPERUSER_EMAIL: admin@fulcrum.local
      FIRST_SUPERUSER_PASSWORD: admin123
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000

  frontend:
    # Use the Bazel-built nginx image
    image: fulcrum/frontend:latest
    # If the image doesn't exist, run: bazel run //frontend/image:frontend_tarball
    depends_on:
      - backend
    ports:
      - "4200:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery:
    image: fulcrum/backend:latest
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://fulcrum:fulcrum@db:5432/fulcrum
      REDIS_URL: redis://redis:6379/0
    command: celery -A src.celery_worker worker --loglevel=info

  flower:
    image: fulcrum/backend:latest
    depends_on:
      - redis
      - celery
    ports:
      - "5555:5555"
    environment:
      REDIS_URL: redis://redis:6379/0
    command: celery -A src.celery_worker flower --port=5555

volumes:
  postgres_data:
