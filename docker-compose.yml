services:
  backend:
    build:
      context: ./backend
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/venv
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://fulcrum:fulcrum@db:5432/fulcrum}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-your_super_secret_key_change_me}
      - MARKETPLACE_ENCRYPTION_KEY=${MARKETPLACE_ENCRYPTION_KEY}
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 # Removed --reload to avoid file watch limit
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-fulcrum}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fulcrum}
      - POSTGRES_DB=${POSTGRES_DB:-fulcrum}
    command: -c listen_addresses='*'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fulcrum} -d ${POSTGRES_DB:-fulcrum}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build:
      context: ./backend
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    command: celery -A src.celery_worker.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env.example
    volumes:
      - ./backend:/app
      - /app/venv
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://fulcrum:fulcrum@db:5432/fulcrum}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-your_super_secret_key_change_me}
    depends_on:
      - redis

  flower:
    image: mher/flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - redis

volumes:
  pg_data:
