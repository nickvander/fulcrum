services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/pytest.ini:/app/pytest.ini
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://fulcrum:fulcrum@db:5432/fulcrum}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-your_super_secret_key_change_me}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-fulcrum}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fulcrum}
      - POSTGRES_DB=${POSTGRES_DB:-fulcrum}
    command: -c listen_addresses='*'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTG-RES_USER:-fulcrum} -d ${POSTGRES_DB:-fulcrum}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build: ./backend
    command: celery -A src.celery_worker.celery_app worker --loglevel=info
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/pytest.ini:/app/pytest.ini
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://fulcrum:fulcrum@db:5432/fulcrum}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - redis

  flower:
    image: mher/flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - redis

  test-db:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-fulcrum}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fulcrum}
      - POSTGRES_DB=${POSTGRES_DB:-fulcrum_test}
    command: -c listen_addresses='*'
    volumes:
      - pg_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fulcrum} -d ${POSTGRES_DB:-fulcrum_test}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  pg_test_data:
