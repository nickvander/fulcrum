services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/migrate.sh:/app/migrate.sh
      - ./backend/tests:/app/tests
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://fulcrum:fulcrum@db:5432/fulcrum}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-your_super_secret_key_change_me}
    depends_on:
      - db
      - redis

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-fulcrum}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fulcrum}
      - POSTGRES_DB=${POSTGRES_DB:-fulcrum}
    command: -c listen_addresses='*'
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build: ./backend
    command: celery -A src.celery_worker.celery_app worker --loglevel=info
    volumes:
      - ./backend/src:/app/src
      - ./backend/migrate.sh:/app/migrate.sh
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://fulcrum:fulcrum@db:5432/fulcrum}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - redis

  flower:
    image: mher/flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - redis

volumes:
  pg_data:
